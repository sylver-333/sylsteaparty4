<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syl’s Tea Party</title>

<style>

body{
font-family: Georgia, serif;
margin:0;
background:#fff7f8;
color:#333;
}

/* HEADER */
header{
background:#e8b7c1;
padding:25px;
text-align:center;
color:white;
}

.logo{
width:80px;
margin:auto;
display:block;
margin-bottom:10px;
border-radius:50%;
background:white;
padding:5px;
}

nav{
background:#d89aa7;
display:flex;
justify-content:center;
}

nav a{
padding:15px 20px;
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
background:#c87e8d;
}

/* HERO */
.hero{
background:
linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600");
background-size:cover;
background-position:center;
height:350px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:36px;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.menu-item{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.menu-item img{
width:100%;
border-radius:8px;
}

/* CART PANEL */
.cart-box{
background:white;
border-radius:12px;
padding:20px;
max-width:500px;
margin:40px auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.cart-controls button{
padding:5px 10px;
margin:0 3px;
}

.total{
text-align:center;
font-size:20px;
margin-top:20px;
}

/* BUTTON */
button{
background:#e8b7c1;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#d89aa7;
}

footer{
background:#e8b7c1;
text-align:center;
padding:20px;
color:white;
}

</style>
</head>

<body>

<header>
<img src="https://via.placeholder.com/150x150.png?text=ST" class="logo">
<h1>Syl’s Tea Party</h1>
</header>

<nav>
<a href="#menu">Menu</a>
<a href="#cart">Cart (<span id="cart-count">0</span>)</a>
</nav>

<div class="hero">
Luxury Tea Experience
</div>

<div class="container" id="menu">

<h2>Menu</h2>

<div class="menu-grid">

<div class="menu-item">
<img src="https://images.unsplash.com/photo-1523906630133-f6934a1ab2b9?q=80&w=800">
<h3>Royal Healing Tea</h3>
<p>$8</p>
<button onclick="addToCart('Royal Healing Tea',8)">Add</button>
</div>

<div class="menu-item">
<img src="https://images.unsplash.com/photo-1498804103079-a6351b050096?q=80&w=800">
<h3>Lavender Earl Grey</h3>
<p>$7</p>
<button onclick="addToCart('Lavender Earl Grey',7)">Add</button>
</div>

</div>

</div>

<!-- CART -->
<div class="container" id="cart">

<h2>Your Cart</h2>

<div class="cart-box" id="cart-items"></div>

<div class="total" id="total"></div>

</div>

<footer>© 2026 Syl’s Tea Party</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price){
let item = cart.find(i => i.name === name);

if(item){
item.qty++;
}else{
cart.push({name, price, qty:1});
}

saveCart();
renderCart();
}

function removeItem(index){
cart.splice(index,1);
saveCart();
renderCart();
}

function changeQty(index, change){
cart[index].qty += change;

if(cart[index].qty <= 0){
removeItem(index);
}else{
saveCart();
renderCart();
}
}

function renderCart(){
let container = document.getElementById("cart-items");
let total = 0;

container.innerHTML = "";

cart.forEach((item, index)=>{
let div = document.createElement("div");
div.className = "cart-item";

div.innerHTML = `
<span>${item.name} ($${item.price})</span>

<div class="cart-controls">
<button onclick="changeQty(${index}, -1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${index}, 1)">+</button>
<button onclick="removeItem(${index})">x</button>
</div>
`;

container.appendChild(div);

total += item.price * item.qty;
});

document.getElementById("total").innerText = "Total: $" + total;
document.getElementById("cart-count").innerText = cart.length;
}

renderCart();

</script>

</body>
</html>
